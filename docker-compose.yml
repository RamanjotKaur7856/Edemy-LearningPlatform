services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: edemy-backend
    ports:
      - "${BACKEND_PORT:-5002}:5002"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-5000}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - edemy-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5002}
    container_name: edemy-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - edemy-network

networks:
  edemy-network:
    driver: bridge
